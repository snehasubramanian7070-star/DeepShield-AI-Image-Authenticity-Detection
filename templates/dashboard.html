<!DOCTYPE html>
<html>
<head>
    <title>DeepShield Dashboard</title>

    <style>
        body{
            font-family:Segoe UI,Arial;
            background:#f4f7fa;
            margin:0;
        }

        .header{
            background:#1f4e79;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:90%;
            margin:40px auto;
        }

        .cards{
            display:flex;
            justify-content:space-between;
            gap:20px;
            flex-wrap:wrap;
        }

        .card{
            flex:1;
            min-width:220px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            text-align:center;
        }

        h2{
            color:#1f4e79;
        }

        .number{
            font-size:35px;
            color:#1f4e79;
            font-weight:bold;
            margin-top:15px;
        }

        a{
            display:inline-block;
            margin-top:30px;
            text-decoration:none;
            background:#1f4e79;
            color:white;
            padding:10px 20px;
            border-radius:6px;
        }
    </style>

</head>

<body>

<div class="header">

<h1>DeepShield Dashboard</h1>

</div>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total Images</h2>
<div class="number">{{ total }}</div>
</div>

<div class="card">
<h2>REAL Images</h2>
<div class="number">{{ real }}</div>
</div>

<div class="card">
<h2>FAKE Images</h2>
<div class="number">{{ fake }}</div>
</div>

<div class="card">
<h2>Average Confidence</h2>
<div class="number">{{ average }}%</div>
</div>

</div>

<center>

<a href="/">⬅ Back to Home</a>

</center>

</div>

</body>
</html>
