<!DOCTYPE html>
<html>

<head>

<title>Prediction History</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fa;
}

.container{
    width:90%;
    margin:auto;
    margin-top:40px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#1f4e79;
    color:white;
}

tr:nth-child(even){
    background:#f2f2f2;
}

a{
    text-decoration:none;
    color:white;
}

.button{
    display:inline-block;
    margin-bottom:20px;
    background:#1f4e79;
    padding:10px 20px;
    border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<a href="/" class="button">⬅ Back</a>

<h1>Prediction History</h1>

<table>

<tr>

<th>ID</th>
<th>Image</th>
<th>Prediction</th>
<th>Confidence</th>


</tr>

{% for row in rows %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}%</td>


</tr>

{% endfor %}

</table>

</div>

</body>

</html>
